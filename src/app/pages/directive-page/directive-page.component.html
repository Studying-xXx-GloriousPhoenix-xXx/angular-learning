<div class="directive-wrapper">
    <span class="directive-goal">Text Recoloring</span>
    <div class="directive-content">
        <div
            appHighlight
            class="topic-text"
        >{{ number }}</div>
    </div>
</div>

<div class="directive-wrapper">
    <span class="directive-goal">Password Hiding</span>
    <div class="directive-content">
        <div class="pwd-wrapper">
            <input #passwordInput type="password" placeholder="Password..." class="g-input pwd-input" />
            <button
                [appTogglePassword]="passwordInput"
                #toggle="togglePassword"
                type="button"
                class="pwd-btn"
            >
                <app-svg [name]="toggle.isTextVisible() ? 'eye-off' : 'eye'" size="16" />
            </button>
        </div>
    </div>
</div>

<div class="directive-wrapper">
    <span class="directive-goal">Field Autofocusing</span>
    <div class="directive-content">
        <input [appAutoFocus]="true" [delay]="300" type="email" placeholder="Email..." class="g-input" />
    </div>
</div>

<div class="directive-wrapper">
    <span class="directive-goal">Field Autoresizing</span>
    <div class="directive-content">
        <textarea
            appAutoResize
            [maxHeight]="150"
            placeholder="Type comment..."
            class="g-textarea"></textarea>
    </div>
</div>
